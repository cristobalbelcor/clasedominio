<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Individuo</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <div class="container">
        <h1 th:text="${individuo.idIndividuo == null ? 'Nuevo Individuo' : 'Editar Individuo'}"></h1>

        <form th:action="@{/guardar}" th:object="${individuo}" method="post">
            <input type="hidden" th:field="*{idIndividuo}" />

            <label>Nombre</label>
            <input type="text" th:field="*{nombre}" required />
            <span class="error-message" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>

            <label>Apellido</label>
            <input type="text" th:field="*{apellido}" required />
            <span class="error-message" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>

            <label>Edad</label>
            <input type="number" th:field="*{edad}" required />
            <span class="error-message" th:if="${#fields.hasErrors('edad')}" th:errors="*{edad}"></span>

            <label>Correo</label>
            <input type="email" th:field="*{correo}" required />
            <span class="error-message" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></span>

            <label>Telefono</label>
            <input type="text" th:field="*{telefono}" required />
            <span class="error-message" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></span>

            <div class="form-actions">
                <button type="submit">Guardar</button>
                <a th:href="@{/}">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
