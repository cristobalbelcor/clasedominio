<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <!-- Se enlaza la hoja de estilos común según la guía, forzando recarga de caché -->
    <link rel="stylesheet" th:href="@{/styles.css(v=2)}">
</head>
<body class="login-body">
    <div class="login-container">
        <!-- Panel Izquierdo -->
        <div class="login-left">
            <h2>Gestión de Individuos</h2>
            <p><strong>Usuarios de prueba:</strong></p>
            <ul>
                <li><b>Admin:</b> admin / 54321</li>
                <li><b>User:</b> user / 12345</li>
            </ul>
        </div>
        
        <!-- Panel Derecho -->
        <div class="login-right">
            <div class="login-box">
                <h1>Inicio de Sesión</h1>

                <div th:if="${param.error}">
                    <p style="color:red; text-align:center;">Usuario o contraseña incorrecta</p>
                </div>
                
                <div th:if="${param.logout}">
                    <p style="color:green; text-align:center;">Sesión cerrada correctamente</p>
                </div>

                <form th:action="@{/login}" method="post">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>

                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                    
                    <button type="submit">Ingresar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
